app:
  name: market-watch-assistant
  environment: development

bot:
  polling_interval_seconds: 300
  default_retention_days: 60
  timezone: Asia/Ho_Chi_Minh

ingestion:
  rss_freshness_hours: 168

alerts:
  immediate_threshold: 80
  watchlist_threshold: 55
  digest_threshold: 30
  default_channel: log

embeddings:
  provider: openrouter
  api_base_url: https://openrouter.ai/api/v1
  model: openai/text-embedding-3-large
  dimensions: 1536
  api_key_env: OPENROUTER_API_KEY
  version: v1
  cluster_attach_enabled: true
  cluster_attach_lookback_days: 7
  cluster_attach_min_similarity: 0.88
  cluster_attach_candidate_limit: 20

llm:
  enabled: true
  provider: openrouter
  api_base_url: https://openrouter.ai/api/v1
  model: openai/gpt-5.4-mini
  api_key_env: OPENROUTER_API_KEY
  prompt_version: event-v1
  temperature: 0.1
  max_tokens: 700
  timeout_seconds: 45
  max_concurrency: 3
  high_score_threshold: 80
  single_source_score_threshold: 90
  market_move_score_threshold: 70
  relevance_score_threshold: 80
  min_modifier: -10
  max_modifier: 10

market_data:
  vn_base_url: http://192.168.100.39:8020
  crypto_provider: binance
  crypto_fallback_provider: coingecko
  global_provider: yahoo
  symbol_map:
    BTC: bitcoin
    ETH: ethereum
    SOL: solana
    SPY: SPY
    QQQ: QQQ
    GLD: GLD
    USO: USO

retention:
  fetch_logs_days: 14
  raw_news_items_days: 60
  normalized_news_items_days: 180
  event_clusters_days: 1095
  alert_decisions_days: 365

logging:
  level: INFO
  log_file: .log/market-watch-bot.log
  console: true
  max_lines: 10000
  backup_count: 5
