app:
  name: market-watch-assistant
  environment: development

bot:
  polling_interval_seconds: 300
  default_retention_days: 60
  timezone: Asia/Ho_Chi_Minh
  command_poll_interval_seconds: 2
  command_drain_limit: 25

ingestion:
  rss_freshness_hours: 168
  tracking_params:
    - utm_source
    - utm_medium
    - utm_campaign
    - utm_content
    - utm_term
    - fbclid
    - gclid
    - ref
  # Title substrings (case-insensitive) marking routine regulatory/fund disclosures
  # republished in bulk by aggregator feeds; matched items are dropped before
  # clustering. These are exact filing-type markers from the RNS taxonomy that do not
  # appear in genuine market headlines. Empty list disables the filter.
  disclosure_noise_patterns:
    - net asset value
    - total voting rights
    - transaction in own shares
    - holding(s) in company
    - director/pdmr shareholding
    - form 8.3

alerts:
  immediate_threshold: 80
  watchlist_threshold: 55
  digest_threshold: 30
  default_channel: telegram

embeddings:
  provider: openrouter
  api_base_url: https://openrouter.ai/api/v1
  model: openai/text-embedding-3-large
  dimensions: 1536
  api_key_env: OPENROUTER_API_KEY
  version: v1
  cluster_attach_enabled: true
  cluster_attach_lookback_days: 7
  cluster_attach_min_similarity: 0.88
  cluster_attach_candidate_limit: 20
  max_concurrency: 8

llm:
  enabled: true
  provider: openrouter
  api_base_url: https://openrouter.ai/api/v1
  model: google/gemini-3.1-flash-lite
  service_tier: 
  api_key_env: OPENROUTER_API_KEY
  prompt_version: event-v2
  temperature: 0.1
  max_tokens: 2000
  timeout_seconds: 45
  max_concurrency: 8
  high_score_threshold: 80
  single_source_score_threshold: 90
  market_move_score_threshold: 70
  relevance_score_threshold: 80
  min_modifier: -10
  max_modifier: 10
  cluster_decision_enabled: true
  cluster_ambiguous_min_similarity: 0.78
  cluster_decision_min_confidence: 70
  cluster_decision_candidate_limit: 3

investigation:
  enabled: true
  brave_search_api_key_env: BRAVE_SEARCH_API_KEY
  max_search_results: 10
  max_evidence_items: 12
  local_evidence_limit: 10
  local_evidence_lookback_days: 3
  timeout_seconds: 20
  max_concurrency: 2
  auto_event_score_threshold: 90
  auto_single_source_score_threshold: 95
  auto_market_move_score_threshold: 85
  auto_rumor_score_threshold: 80
  min_modifier: -10
  max_modifier: 10
  official_domains:
    - sec.gov
    - federalreserve.gov
    - treasury.gov
    - sbv.gov.vn
    - ssc.gov.vn
    - hsx.vn
    - hnx.vn
  high_quality_domains:
    - reuters.com
    - bloomberg.com
    - ft.com
    - wsj.com
    - coindesk.com
    - cointelegraph.com

market_data:
  vn_base_url: http://192.168.100.39:8020
  crypto_provider: coingecko
  crypto_fallback_provider: binance
  global_provider: hyperliquid
  hyperliquid_base_url: https://api.hyperliquid.xyz
  hyperliquid_dex: xyz
  hyperliquid_min_day_notional_volume: 100000
  symbol_map:
    BTC: bitcoin
    ETH: ethereum
    SOL: solana
    BNB: binancecoin
    SPX: xyz:SP500
    SP500: xyz:SP500
    NDX: xyz:XYZ100
    XYZ100: xyz:XYZ100
    GOLD: xyz:GOLD
    XAU: xyz:GOLD
    SILVER: xyz:SILVER
    XAG: xyz:SILVER
    WTI: xyz:CL
    CL: xyz:CL
    BRENT: xyz:BRENTOIL
    NVDA: xyz:NVDA
    AAPL: xyz:AAPL
    MSFT: xyz:MSFT
    TSLA: xyz:TSLA
    META: xyz:META
    GOOGL: xyz:GOOGL
    AMZN: xyz:AMZN

configuration_presets:
  sources:
    source_types: [rss, google-rss, crawler]
    regions: [global, asia, us, vietnam, china, crypto, other]
    categories:
      - global_macro
      - us_equity
      - vietnam_equity
      - crypto
      - commodity
      - fx
      - rates
      - geopolitics
      - company_disclosure
      - exchange_announcement
    languages: [en, vi, zh, ja, multi]
  watchlist:
    entity_types: [equity, etf, crypto, macro_theme, commodity, currency, sector, company, index]
    tiers: [S, A, B, C, D]
    regions: [global, asia, us, vietnam, china, crypto, other]
    asset_classes: [equity, crypto, global_macro, vietnam_equity, us_equity, commodity, fx, rates, credit]

retention:
  fetch_logs_days: 14
  raw_news_items_days: 60
  normalized_news_items_days: 180
  event_clusters_days: 1095
  alert_decisions_days: 365

logging:
  level: INFO
  # Per-component files are written here: api.log, worker-pipeline.log,
  # worker-command.log, worker.log, cli.log. Set to null to disable file logging.
  log_dir: .log
  console: true
  max_lines: 10000
  backup_count: 5
