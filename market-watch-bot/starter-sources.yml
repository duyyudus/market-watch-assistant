# Starter source guide
#
# Add new source entries under `sources:` using these fields:
#
# - name: Human-readable unique source name. `market-watch migrate` uses this
#   name to update existing starter sources.
# - url: Feed URL for `type: rss`, or a section/front page for `type: crawler`.
# - region: One of:
#   global, asia, us, vietnam, china, crypto, other
# - category: One of:
#   global_macro, us_equity, vietnam_equity, crypto, commodity, fx, rates,
#   geopolitics, company_disclosure, exchange_announcement
# - type: Technical ingestion mechanism. Currently supported values:
#   rss
#   Official RSS feeds still use `type: rss`; represent official/trusted
#   provenance with a high score, suitable category, and clear source name.
#   crawler
#   Polls section pages, discovers same-site article links, and fetches public
#   article metadata/text. Paywalled pages may only provide title/snippet/time.
#   api, newsletter, and social are not implemented news source types unless
#   dedicated fetchers/parsers are added.
# - language: One of:
#   en, vi, zh, ja, multi
# - score: Source quality score from 0 to 100. Suggested values:
#   100 = official regulator / central bank / exchange / company filing
#   90  = institutional wire/API
#   75  = reputable financial media
#   60  = aggregator or broad free media feed
#   40  = blog/social/community feed
#   20  = unverified source
# - interval: Polling interval in seconds. Suggested values:
#   300  = high-priority official/crypto feeds
#   600  = regular financial RSS
#   900  = Vietnam market RSS or medium-priority feeds
#   1800 = broad aggregators or lower-priority feeds
# - enabled: Optional boolean. Defaults to true. Use false for known blocked
#   or licensed sources retained as examples but not active starter feeds.
#
# Common examples:
# - Vietnam stocks: region=vietnam, category=vietnam_equity, language=vi
# - US equities: region=us, category=us_equity, language=en
# - Global macro: region=global or us, category=global_macro, language=en
# - Crypto: region=crypto, category=crypto, language=en
# - Central bank/regulator RSS: type=rss, score=90-100
# - Public news section crawler: type=crawler, score=75-90

sources:
- name: Federal Reserve Press Releases
  url: https://www.federalreserve.gov/feeds/press_all.xml
  region: us
  category: global_macro
  type: rss
  language: en
  score: 100
  interval: 900
