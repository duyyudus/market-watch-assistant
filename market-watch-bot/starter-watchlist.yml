# Starter watchlist guide
#
# Import with:
#   uv run market-watch watchlist import starter-watchlist.yml
#
# Entries use the same top-level `watchlist:` payload accepted by
# `market-watch watchlist import` and emitted by `market-watch watchlist export`.
# Enabled entries below are intentionally limited to symbols routed by the default
# market-data configuration or by explicit Vietnam equity metadata.
# Disabled examples are useful templates for news/entity matching, but should only
# be enabled after a market-data route is configured.

watchlist:
- name: S&P 500 Index
  symbol: SPX
  entity_type: index
  tier: S
  region: us
  asset_class: us_equity
  aliases: [S&P 500, SP500, S&P 500 futures, US benchmark, US large caps]
  enabled: true
